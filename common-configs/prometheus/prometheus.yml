global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: individuals-api-metrics
    static_configs:
      - targets: ['individuals-api:8081']
    metrics_path: '/actuator/prometheus'

  - job_name: person-service-metrics
    static_configs:
      - targets: ['person-service:8082']
    metrics_path: '/actuator/prometheus'