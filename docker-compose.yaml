version: '3.8'
services:
  individuals-api:
    container_name: Individuals-API
    build:
      context: .
      dockerfile: ./individuals-api/Dockerfile
    image: u23592/individuals-api:1.0.0
    env_file:
      - ./individuals-api/.env
    ports:
      - "8081:8081"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      grafana:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: container=individuals-api
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  person-service:
    container_name: Person-service
    build:
      context: .
      dockerfile: ./person-service/Dockerfile
    image: u23592/person-service:1.0.0
    env_file:
      - ./person-service/.env
    ports:
      - "8082:8082"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      grafana:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-external-labels: container=individuals-api
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:8082/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:18.3
    container_name: Postgres
    ports:
      - "5435:5432"
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: keycloak_db
      PGDATA: /var/lib/postgresql/17/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d keycloak_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    container_name: Keycloak
    ports:
      - "8080:8080"
    networks:
      - app-network
    command:
      - "start-dev"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: root
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
#      KC_LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.11.1
    container_name: Prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network
    volumes:
      - ./common-configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.7.1
    container_name: Loki
    ports:
      - "3100:3100"
    networks:
      - app-network
    command: -config.file=/etc/loki/local-config.yaml
#    volumes:
#      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:3100/ready" ]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    container_name: Grafana
    image: grafana/grafana:12.4.2
    ports:
      - "3000:3000"
    networks:
      - app-network
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      prometheus:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector:0.118.0
    container_name: OTEL
    command: --config=/etc/otelcol/config.yaml
    volumes:
      - ./common-configs/otel-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP http receiver
    networks:
      - app-network

  zipkin:
    image: openzipkin/zipkin:3.4.0
    container_name: Zipkin
    ports:
      - "9411:9411"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  keycloak:
    driver: local