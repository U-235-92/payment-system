server:
  port: ${APP_PORT}
spring:
  application:
    name: ${APP_NAME}
  profiles:
    active:
      - dev
  main:
    web-application-type: reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
          jwk-set-uri: ${JWT_JWK_SET_URI}
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}
            token-uri: ${KEYCLOAK_TOKEN_URI}
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            admin-id: ${KEYCLOAK_ADMIN_ID}
            admin-secret: ${KEYCLOAK_ADMIN_SECRET}
management:
  otlp:
    metrics:
      export:
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_COLLECTOR_URI} # Connect to OTEL collector
  metrics:
    tags:
      application: ${APP_NAME}
  endpoints:
    web:
      exposure:
        include:
          - prometheus
          - info
          - health
application:
  person-service:
    uri: ${PERSON_SERVICE_URI}
    endpoints:
      create-person: ${PERSON_SERVICE_CREATE_PERSON_ENDPOINT}
      delete-person-by-keycloak-id: ${PERSON_SERVICE_DELETE_PERSON_ENDPOINT}
      undo-delete-person-by-keycloak-id: ${PERSON_SERVICE_UNDO_DELETE_PERSON_ENDPOINT}
      update-person: ${PERSON_SERVICE_UPDATE_PERSON_ENDPOINT}
      undo-update-person: ${PERSON_SERVICE_UNDO_UPDATE_PERSON_ENDPOINT}
      get-person-info-by-keycloak-id: ${PERSON_SERVICE_GET_PERSON_INFO_ENDPOINT}