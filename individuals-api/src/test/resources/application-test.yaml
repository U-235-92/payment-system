server:
  port: 8081
spring:
  application:
    name: individuals-api
  main:
    web-application-type: reactive
management:
  otlp:
    metrics:
      export:
        enabled: false
  metrics:
    tags:
      application: individuals-api
  endpoints:
    web:
      exposure:
        include:
          - prometheus
          - info
          - health
application:
  person-service:
    uri: http://localhost:8082
    endpoints:
      create-person: /api/person/create-person
      delete-person-by-keycloak-id: /api/person/delete-person-by-keycloak-id/
      undo-delete-person-by-keycloak-id: /api/person/undo-delete-person-by-keycloak-id/
      update-person: /api/person/update-person
      undo-update-person: /api/person/undo-update-person
      get-person-info-by-keycloak-id: /api/person/get-person-by-keycloak-id/