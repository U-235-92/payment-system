logging:
  level:
    org:
      springframework:
        security: debug
spring:
  datasource:
    url: jdbc:h2:mem:person-service-test-db;INIT=RUNSCRIPT FROM 'classpath:dev/db/init.sql'
    driver-class-name: org.h2.Driver
    username: root
    password:
  flyway:
    enabled: false
  jpa:
    show-sql: true
    generate-ddl: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console
